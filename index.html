
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem Estar Controle - Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                orange: '#F6511D',
                green: '#8AC926',
                blue: '#1C5CB0',
                cyan: '#6ED1EA',
                yellow: '#FEC601'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'subtle': '0 4px 20px -4px rgba(0,0,0,0.03)',
              'subtle-lg': '0 10px 30px -10px rgba(0,0,0,0.05)'
            }
          }
        }
      }
    </script>
    <style>
      /* Reset básico para funcionamento do App */
      html, body { height: 100%; margin: 0; padding: 0; }
      body { background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
      
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      /* REGRAS DE IMPRESSÃO - CORREÇÃO DEFINITIVA */
      @media print {
        @page {
          size: A4;
          margin: 10mm;
        }

        /* Oculta TUDO que tenha a classe no-print */
        .no-print, aside, header, nav, button, .controls-bar {
          display: none !important;
          visibility: hidden !important;
        }

        /* Quebra as amarras de overflow:hidden do layout principal */
        html, body, #root, main, .flex-1, .overflow-hidden, .overflow-auto, .h-full {
          display: block !important;
          overflow: visible !important;
          height: auto !important;
          min-height: auto !important;
          position: static !important;
          background: white !important;
        }

        /* Garante que o container do relatório ocupe a largura total */
        .max-w-4xl, .max-w-5xl {
          max-width: 100% !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Força os gráficos SVG a aparecerem */
        .recharts-responsive-container {
          width: 100% !important;
          height: 350px !important; /* Altura fixa necessária para renderizar SVGs no print */
          min-height: 350px !important;
          display: block !important;
          page-break-inside: avoid;
        }

        /* Preservar cores (Tailwind utiliza cores de fundo que o print costuma ignorar) */
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Remove sombras que ficam borradas na impressão */
        .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl {
          box-shadow: none !important;
          border: 1px solid #eee !important;
        }

        .bg-slate-900 {
          background-color: #000 !important;
          color: #fff !important;
        }
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.474.0",
    "recharts": "https://esm.sh/recharts@2.15.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
