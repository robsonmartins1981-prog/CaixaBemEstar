
<!DOCTYPE html>

    <title>Bem Estar Controle - Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                orange: '#F6511D',
                green: '#8AC926',
                blue: '#1C5CB0',
                cyan: '#6ED1EA',
                yellow: '#FEC601'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow: {
              'subtle': '0 2px 10px -2px rgba(0,0,0,0.03)',
              'subtle-lg': '0 6px 20px -6px rgba(0,0,0,0.05)'
            }
          }
        }
      }
    </script>
    <style>
      html, body { height: 100%; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      body { background-color: #f1f5f9; color: #1e293b; overflow-x: hidden; font-size: 14px; }
      
      /* Otimização de scrollbars */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }

      /* Ajustes para inputs mobile */
      input, select, button { font-size: 16px !important; } /* Previne zoom no iOS */
      @media (min-width: 768px) {
        input, select, button { font-size: 14px !important; }
      }

      /* REGRAS DE IMPRESSÃO */
      @media print {
        @page { size: A4; margin: 10mm; }
        .no-print { display: none !important; }
        body { background: white !important; }
        .recharts-responsive-container { height: 300px !important; }
      }
    </style>
